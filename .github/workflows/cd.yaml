name: CD - Deploy to Railway

on:
  workflow_run:
    workflows: ["CI - Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway redeploy --service contractsense-backend --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
```

---

## How it works
```
git push origin main
       ↓
CI runs → Builds & Pushes Docker image to DockerHub
       ↓
CD triggers automatically ONLY if CI succeeds ✅
       ↓
Railway pulls latest image and redeploys
       ↓
Live ✅