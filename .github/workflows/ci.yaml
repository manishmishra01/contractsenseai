name: Backend CI

on:
  push:
    paths:
      - 'BACKEND/**'
  pull_request:
    paths:
      - 'BACKEND/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BACKEND

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest