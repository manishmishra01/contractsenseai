app = "contractsense-backend"
primary_region = "sin"

[build]
  image = "docker.io/yourusername/contractsense-backend:latest"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1